name: Release Helm Chart

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  REPOSITORY: rhai-code

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint chart
        run: helm lint .

      - name: Test template rendering
        run: helm template openclaw .

      - name: Extract chart version
        id: chart_version
        run: |
          VERSION=$(grep '^version:' Chart.yaml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Chart version: $VERSION"

    outputs:
      chart_version: ${{ steps.chart_version.outputs.version }}

  publish:
    runs-on: ubuntu-latest
    needs: lint-and-test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract chart version and check if exists
        id: check_version
        run: |
          CHART_VERSION=${{ needs.lint-and-test.outputs.chart_version }}
          COMMIT_SHA=${{ github.sha }}
          COMMIT_SHA_SHORT=$(echo $COMMIT_SHA | cut -c1-8)
          echo "chart_version=$CHART_VERSION" >> $GITHUB_OUTPUT
          echo "Checking if version $CHART_VERSION exists..."

          # Try to pull the chart with the version tag using helm
          if helm pull oci://${{ env.REGISTRY }}/${{ env.REPOSITORY }}/openclaw --version $CHART_VERSION --destination /tmp 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "commit_tag=${CHART_VERSION}-dev-build-${COMMIT_SHA_SHORT}" >> $GITHUB_OUTPUT
            echo "Chart version $CHART_VERSION already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "commit_tag=${CHART_VERSION}-build-${COMMIT_SHA_SHORT}" >> $GITHUB_OUTPUT
            echo "Chart version $CHART_VERSION does not exist"
          fi

      - name: Package and push chart with commit SHA
        run: |
          COMMIT_VERSION=${{ steps.check_version.outputs.commit_tag }}
          echo "Packaging and pushing chart with version: $COMMIT_VERSION"
          helm package --version=$COMMIT_VERSION --destination ./dist .
          helm push ./dist/openclaw-$COMMIT_VERSION.tgz oci://${{ env.REGISTRY }}/${{ env.REPOSITORY }} --debug

      - name: Package and push chart with version (if not exists)
        if: steps.check_version.outputs.exists == 'false'
        run: |
          CHART_VERSION=${{ steps.check_version.outputs.chart_version }}
          echo "Packaging and pushing chart with version: $CHART_VERSION"
          helm package --destination ./dist .
          helm push ./dist/openclaw-$CHART_VERSION.tgz oci://${{ env.REGISTRY }}/${{ env.REPOSITORY }} --debug

      - name: Report status
        run: |
          COMMIT_VERSION=${{ steps.check_version.outputs.commit_tag }}
          CHART_VERSION=${{ steps.check_version.outputs.chart_version }}
          EXISTS=${{ steps.check_version.outputs.exists }}
          echo "Chart published with:"
          echo "- ${COMMIT_VERSION}"
          if [ "$EXISTS" == "true" ]; then
            echo
            echo "::warning::Chart version $CHART_VERSION already published."
            echo "To publish a new version, update the version field in Chart.yaml"
          else
            echo "- ${CHART_VERSION}"
          fi
