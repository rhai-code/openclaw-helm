apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openclaw.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
    {{- with .Values.podLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    checksum/config: {{ include "openclaw.configHash" . }}
    {{- with .Values.podAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "openclaw.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openclaw.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include "openclaw.configHash" . }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openclaw.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        # OpenClaw Gateway Container
        - name: openclaw
          image: "{{ .Values.openclaw.image.repository }}:{{ .Values.openclaw.image.tag }}"
          imagePullPolicy: {{ .Values.openclaw.image.pullPolicy }}
          ports:
            - name: gateway
              containerPort: {{ .Values.openclaw.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: HOME
              value: "/home/node"
            {{- with .Values.openclaw.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /home/node/.openclaw/openclaw.json
              subPath: openclaw.json
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- if .Values.workspace.enabled }}
            - name: workspace
              mountPath: {{ .Values.workspace.mountPath }}
            {{- end }}
            {{- if .Values.ephemeral.cache.enabled }}
            - name: cache
              mountPath: /home/node/.cache
            {{- end }}
            {{- if .Values.ephemeral.home.enabled }}
            - name: home
              mountPath: /home/node
            {{- end }}
          {{- if .Values.openclaw.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: gateway
            initialDelaySeconds: {{ .Values.openclaw.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.openclaw.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.openclaw.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.openclaw.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.openclaw.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: gateway
            initialDelaySeconds: {{ .Values.openclaw.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.openclaw.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.openclaw.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.openclaw.readinessProbe.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.openclaw.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
          command:
            - node
            - openclaw.mjs
            - gateway
            - --allow-unconfigured

        # ClawSuite Sidecar Container
        {{- if .Values.clawsuite.enabled }}
        - name: clawsuite
          image: "{{ include "openclaw.clawsuite.image" . }}"
          imagePullPolicy: {{ .Values.clawsuite.image.pullPolicy }}
          ports:
            - name: clawsuite
              containerPort: {{ .Values.clawsuite.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: CLAWDBOT_GATEWAY_URL
              value: "ws://localhost:{{ .Values.openclaw.port }}"
            {{- with .Values.clawsuite.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.clawsuite.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
        {{- end }}

        # OpenShift OAuth Proxy Sidecar
        - name: oauth-proxy
          image: "{{ .Values.oauthProxy.image.repository }}:{{ .Values.oauthProxy.image.tag }}"
          imagePullPolicy: {{ .Values.oauthProxy.image.pullPolicy }}
          ports:
            - name: oauth-proxy
              containerPort: {{ .Values.oauthProxy.port }}
              protocol: TCP
          args:
            - --provider=openshift
            - --openshift-service-account={{ include "openclaw.serviceAccountName" . }}
            - --upstream=http://localhost:{{ .Values.openclaw.port }}
            {{- if .Values.clawsuite.enabled }}
            - --upstream=http://localhost:{{ .Values.clawsuite.port }}/clawsuite
            {{- end }}
            - --http-address=
            - --https-address=:{{ .Values.oauthProxy.port }}
            - --tls-cert=/etc/tls/private/tls.crt
            - --tls-key=/etc/tls/private/tls.key
            - --cookie-secret-file=/etc/proxy/secrets/session_secret
            - --cookie-expire=24h0m
            - --cookie-refresh=1h
            - --pass-access-token=true
            - --pass-user-headers=true
            - --request-logging=false
            - '--openshift-sar={{ tpl .Values.oauthProxy.sar . }}'
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: oauth-tls
              mountPath: /etc/tls/private
              readOnly: true
            - name: oauth-secret
              mountPath: /etc/proxy/secrets
              readOnly: true
          resources:
            {{- toYaml .Values.oauthProxy.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true

      volumes:
        - name: config
          configMap:
            name: {{ include "openclaw.fullname" . }}-config
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "openclaw.fullname" . }}-data
        {{- end }}
        {{- if .Values.workspace.enabled }}
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ include "openclaw.fullname" . }}-workspace
        {{- end }}
        {{- if .Values.ephemeral.cache.enabled }}
        - name: cache
          emptyDir:
            sizeLimit: {{ .Values.ephemeral.cache.sizeLimit }}
        {{- end }}
        {{- if .Values.ephemeral.home.enabled }}
        - name: home
          emptyDir:
            sizeLimit: {{ .Values.ephemeral.home.sizeLimit }}
        {{- end }}
        - name: oauth-tls
          secret:
            secretName: {{ include "openclaw.fullname" . }}-tls
            defaultMode: 420
        - name: oauth-secret
          secret:
            secretName: {{ include "openclaw.fullname" . }}-oauth
            defaultMode: 420
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
