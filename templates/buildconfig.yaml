{{- if and .Values.clawsuite.enabled (not .Values.clawsuite.image.repository) }}
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: {{ include "openclaw.fullname" . }}-clawsuite
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  source:
    type: Dockerfile
    dockerfile: |
{{ .Files.Get "files/Dockerfile.clawsuite" | indent 6 }}
  strategy:
    type: Docker
    dockerStrategy:
      buildArgs:
        - name: BASE
          value: image-registry.openshift-image-registry.svc:5000/openshift/nodejs:22-ubi9
        - name: CLAWSUITE_REF
          value: {{ .Values.clawsuite.build.git.ref }}
        - name: OPENCLAW_VERSION
          value: {{ .Chart.AppVersion }}
  output:
    to:
      kind: ImageStreamTag
      name: {{ include "openclaw.fullname" . }}-clawsuite:latest
  triggers:
    {{- if .Values.clawsuite.build.triggers.configChange }}
    - type: ConfigChange
    {{- end }}
    {{- if .Values.clawsuite.build.triggers.imageChange }}
    - type: ImageChange
      imageChange:
        from:
          kind: ImageStreamTag
          name: nodejs-22:latest
          namespace: openshift
    {{- end }}
  runPolicy: Serial
{{- end }}
